version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: goalnest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goalnest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goalnest_dev_password}
      POSTGRES_DB: goalnest
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U goalnest -d goalnest']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goalnest-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: goalnest-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://goalnest:${POSTGRES_PASSWORD:-goalnest_dev_password}@postgres:5432/goalnest?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/v1/auth/google/callback}
    ports:
      - '3001:3001'
    volumes:
      - backend_uploads:/app/backend/uploads

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_BILLING_ENABLED: ${BILLING_ENABLED:-false}
        NEXT_PUBLIC_FREE_TRIAL_DAYS: ${FREE_TRIAL_DAYS:-30}
        API_PROXY_TARGET: http://backend:3001
    container_name: goalnest-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_PROXY_TARGET: http://backend:3001
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
