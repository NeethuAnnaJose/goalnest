name: goalnest
description: GoalNest personal finance tracker for India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/goalnest-logo.png
